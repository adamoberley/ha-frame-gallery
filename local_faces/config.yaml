# Local Faces - Home Assistant add-on manifest.
#
# Open-source, on-device face recognition. Pulls frames from a camera, detects
# faces with YuNet and matches them to people you enroll from the dashboard with
# SFace - all on CPU, light enough for a Pi 4+. Recognized names are exposed to
# HA as a sensor over MQTT; recognition, enrollment, and the log never leave the
# box (only an optional push notification does).
name: Local Faces
version: "0.5.0"
slug: local_faces
description: >-
  On-device, open-source face recognition. Enroll people from a dashboard;
  recognized names show up in HA as a sensor. Runs on CPU - light enough for a Pi.
url: https://github.com/adamoberley/ha-addons/tree/main/local_faces

# OpenCV + onnx wheels ship for 64-bit only; Pi 4/5 run a 64-bit OS (aarch64).
arch:
  - aarch64
  - amd64

init: false
startup: services
boot: auto

# Ingress: live view, enrollment dashboard, and the recognition log.
ingress: true
ingress_port: 8099
panel_icon: mdi:face-recognition
panel_title: Local Faces

# The "Recognized Name" sensor is published via MQTT discovery; auto-configures
# from the Mosquitto broker add-on. Push notifications use the HA core API.
services:
  - mqtt:want
homeassistant_api: true
hassio_api: true

options:
  cameras: []
  stream_url: ""
  camera_mode: "stream"
  preview_aspect: "auto"
  mode: "balanced"
  recognition_model: "sface"
  recognition_model_url: ""
  detect_interval: 1.0
  recognition_threshold: 0.363
  min_face_size: 60
  cooldown_seconds: 15
  notify_service: ""
  notify_unknown: true
  enable_mqtt: true
  mqtt_host: ""
  mqtt_port: 1883
  mqtt_username: ""
  mqtt_password: ""
  log_level: "info"

schema:
  # One entry per camera (name + URL + mode); enrollments are shared across all
  # of them and each gets its own sensor. Leave empty to use the single Camera URL.
  cameras:
    - name: str
      stream_url: str
      camera_mode: "list(stream|snapshot)"
  # Camera URL. RTSP (rtsp://user:pass@cam/stream) or an HTTP/MJPEG stream for
  # "stream" mode; a still-image snapshot URL for "snapshot" mode. Single-camera
  # fallback, used only when no cameras are listed above.
  stream_url: "str?"
  camera_mode: "list(stream|snapshot)"
  # Dashboard preview shape. "auto" matches the camera's real frame (best for a
  # portrait 9:16 doorbell); or force a ratio. Recognition is unaffected either way.
  preview_aspect: "list(auto|16:9|9:16|4:3|3:4|1:1)"
  # Fast vs Accurate: smaller processing size = faster on a Pi; larger catches
  # smaller/farther faces. Recognition always uses the full-res aligned crop.
  mode: "list(fast|balanced|accurate)"
  # Recognition model. "sface" is bundled (Apache-2.0). "mobilefacenet_w600k" is
  # smaller and more accurate but has a non-commercial license, so you must supply
  # the .onnx yourself (recognition_model_url or drop it in /data/models).
  recognition_model: "list(sface|mobilefacenet_w600k)"
  # URL to fetch the chosen model's .onnx if it isn't already in /data/models.
  # Only needed for non-bundled models; you're accepting that model's license.
  recognition_model_url: "str?"
  # Seconds between detections (how often a frame is analyzed).
  detect_interval: "float(0.2,30)"
  # Cosine match threshold; higher = stricter (fewer false matches, more misses).
  recognition_threshold: "float(0.1,1.0)"
  # Ignore faces smaller than this many pixels tall (cuts distant false hits).
  min_face_size: "int(20,1000)"
  # Per-identity debounce: don't re-log/notify the same name within N seconds.
  cooldown_seconds: "int(0,3600)"
  # HA notify service for a push, e.g. "notify.mobile_app_pixel". Blank = off.
  notify_service: "str?"
  notify_unknown: "bool"
  # Publish the "Recognized Name" sensor over MQTT.
  enable_mqtt: "bool"
  # Leave MQTT fields blank to auto-detect the Mosquitto broker add-on; or set
  # them to point at your own broker.
  mqtt_host: "str?"
  mqtt_port: "port"
  mqtt_username: "str?"
  mqtt_password: "password?"
  log_level: "list(debug|info|warning|error)"
