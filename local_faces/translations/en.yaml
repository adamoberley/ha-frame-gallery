# Labels + help shown on the app's Configuration tab.
configuration:
  cameras:
    name: Cameras
    description: >-
      One entry per camera (name, stream URL, and mode). Leave empty to use the
      single Camera URL below. Enrollments are shared across every camera, and
      each camera gets its own "Recognized Name" sensor in Home Assistant.
  stream_url:
    name: Camera URL
    description: >-
      Your camera's stream. For "stream" mode use an RTSP URL
      (rtsp://user:pass@camera-ip/stream) or an HTTP/MJPEG stream. For "snapshot"
      mode use a still-image URL that returns a fresh JPEG each request. Tip: most
      HA camera integrations expose one of these.
  camera_mode:
    name: Camera mode
    description: >-
      "stream" reads a continuous RTSP/HTTP feed (lowest latency). "snapshot"
      polls a still-image URL every interval (lighter, good for cameras that only
      offer a snapshot endpoint).
  preview_aspect:
    name: Preview aspect ratio
    description: >-
      Shape of the live preview on the dashboard. "auto" matches your camera's
      actual frame, so a portrait (9:16) doorbell fills correctly instead of being
      cropped; or force 16:9, 9:16, 4:3, 3:4, or 1:1. Recognition is unaffected.
  mode:
    name: Speed vs accuracy
    description: >-
      "fast" downscales more before detection (lightest on a Pi); "accurate"
      keeps more detail to catch smaller or farther faces. Recognition itself
      always runs on the full-resolution aligned face.
  recognition_model:
    name: Recognition model
    description: >-
      "sface" is bundled and Apache-2.0 - the recommended default.
      "mobilefacenet_w600k" (InsightFace) is smaller and more accurate, but its
      weights are non-commercial/research-only, so you must supply the file
      yourself (see Recognition model URL) and accept that license. Enrollments
      are kept per-model, so switching back and forth is safe.
  recognition_model_url:
    name: Recognition model URL
    description: >-
      Direct URL to the chosen model's .onnx, used only if it isn't already in
      /data/models. Needed for non-bundled models. Leave blank for "sface".
  detect_interval:
    name: Detection interval (seconds)
    description: How often a frame is analyzed. 1 second is plenty for a doorway.
  recognition_threshold:
    name: Match threshold
    description: >-
      Cosine similarity required to count as a match (0.363 is a good default).
      Raise it if strangers get matched to someone; lower it if known people are
      missed.
  min_face_size:
    name: Minimum face size (px)
    description: >-
      Ignore faces shorter than this many pixels. Raising it skips tiny, distant
      faces that cause false detections.
  cooldown_seconds:
    name: Re-trigger cooldown (seconds)
    description: >-
      After someone is seen, wait this long before logging/notifying that same
      identity again - stops a lingering face from spamming you.
  notify_service:
    name: Notify service
    description: >-
      Home Assistant notify service for a push on a match, e.g.
      "notify.mobile_app_pixel". Leave blank to disable notifications.
  notify_unknown:
    name: Notify on unknown faces
    description: Also send a notification when an unrecognized face is seen.
  enable_mqtt:
    name: Publish HA sensor (MQTT)
    description: >-
      Expose a "Recognized Name" sensor to Home Assistant via MQTT discovery so
      you can automate off it. Requires the Mosquitto broker app (or your own).
  mqtt_host:
    name: MQTT host
    description: >-
      Leave blank to auto-detect the Mosquitto broker app. Set it only to use
      an external broker.
  mqtt_port:
    name: MQTT port
    description: MQTT broker port (default 1883). Only used with a manual host.
  mqtt_username:
    name: MQTT username
    description: Only used with a manual MQTT host.
  mqtt_password:
    name: MQTT password
    description: Only used with a manual MQTT host.
  log_level:
    name: Log level
    description: Set to debug to troubleshoot the camera, models, or MQTT connection.
