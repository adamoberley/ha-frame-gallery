# Labels + help shown on the app's Configuration tab.
configuration:
  tv_ip:
    name: Frame TV IP(s)
    description: >-
      Leave blank to auto-discover every Frame from your Samsung TV integration.
      Or enter one or more IPs, comma-separated, to override. First run shows an
      "Allow connection?" prompt on each TV - accept it once with the remote.
  tv_mac:
    name: Frame TV MAC(s) (Wake-on-LAN)
    description: >-
      Optional. MAC address(es) of your Frame TV(s) so a sleeping TV gets a
      Wake-on-LAN nudge before a push retry. Comma-separated, in the same order
      as the IPs above. For more than one TV, also set Frame TV IP(s) explicitly
      so each MAC pairs with the right TV (auto-discovery order isn't guaranteed).
      Leave blank to skip Wake-on-LAN.
  interval_minutes:
    name: Change interval (minutes)
    description: >-
      How often a new piece is pushed - used only when Daily switch time is blank.
  daily_time:
    name: Daily switch time
    description: >-
      Switch once a day at this local time (HH:MM, 24-hour), e.g. 04:00. Leave
      blank to use the change interval above instead.
  source:
    name: Art source
    description: >-
      Where art comes from. "reframed" pulls reframed.gallery's curated,
      Frame-ready public-domain collection (recommended). "artic" uses the Art
      Institute of Chicago's full public-domain catalogue - far larger, but with
      many non-painting objects (coins, fragments, textiles).
  collection:
    name: Collection (reframed)
    description: >-
      Which reframed.gallery collection to show. "seasonal" auto-tracks the date
      (Winter/Spring/Summer/Fall, with December = Christmas); "weather" tracks the
      weather entity below (rain = nocturnes, snow = winter, sun = summer, etc.);
      "all" pulls the whole catalogue; or set a collection slug like "by-the-sea",
      "golden-hour", or "nocturnes-moonlight".
  hemisphere:
    name: Hemisphere
    description: >-
      Used by "seasonal" only - flips the season calendar for the Southern hemisphere.
  weather_entity:
    name: Weather entity (for "weather" collection)
    description: >-
      The Home Assistant weather entity to follow when Collection is "weather",
      e.g. weather.home or weather.forecast_home. Its condition picks a matching
      collection; unknown conditions fall back to the season. Leave blank if unused.
  resolution:
    name: Panel resolution
    description: 3840x2160 for 4K Frames (most); 1920x1080 for 32" / pre-2021.
  query:
    name: Art search
    description: >-
      Shape the collection with a free-text search, e.g. "landscape",
      "impressionism", "ukiyo-e", "still life", "Monet". Blank pulls from the
      whole public-domain catalogue.
  public_domain_only:
    name: Public domain only
    description: >-
      Only show CC0 / public-domain works (recommended - clean licensing for
      display).
  exclude_keywords:
    name: Excluded keywords
    description: >-
      Comma-separated. Any work whose title/artist/tags contain one is skipped -
      the family-safe filter. Blank to disable.
  fit:
    name: Fit
    description: >-
      How non-16:9 art fills the panel. "matte" frames it on a mat with nothing
      cropped (like a print); "crop" fills the screen and trims the edges.
  mat_color:
    name: Mat color
    description: Background colour behind matted art (hex). Dark hides glare at night.
  tv_matte:
    name: TV matte
    description: >-
      "none" keeps the in-image fit above. Or enter a Samsung matte id (e.g.
      modern_apricot, shadowbox_polar) to have the TV render a real mat around the
      art - it's sent full-bleed so it isn't double-framed. Availability varies by
      Frame model; an unsupported id falls back to none. Switch it live from the
      Matte select in Home Assistant.
  active_hours:
    name: Active hours
    description: >-
      Leave blank to change art 24/7, or set a local-time window like
      07:00-23:00. Outside it the app idles and leaves the last piece up.
  avoid_repeat_count:
    name: No-repeat memory
    description: >-
      Don't repeat the last N pieces (0 = allow repeats). The fix for the old
      art-changer showing the same things over and over.
  enable_mqtt:
    name: Home Assistant entities (MQTT)
    description: >-
      Expose a Current Art sensor, a Next button, and a Collection select to Home
      Assistant via MQTT discovery, so you can automate the gallery. Requires the
      Mosquitto broker add-on (or your own).
  mqtt_host:
    name: MQTT host
    description: Leave blank to auto-detect the Mosquitto broker add-on. Set it for an external broker.
  mqtt_port:
    name: MQTT port
    description: MQTT broker port (default 1883). Only used with a manual host.
  mqtt_username:
    name: MQTT username
    description: Only used with a manual MQTT host.
  mqtt_password:
    name: MQTT password
    description: Only used with a manual MQTT host.
  log_level:
    name: Log level
    description: Set to debug to troubleshoot the art source or TV connection.
