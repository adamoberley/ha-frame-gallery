<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hue Entertainment</title>
<style>
  :root {
    --bg: #111318; --card: #1c1f27; --card2: #242834; --text: #e7e9ee;
    --dim: #9aa0ad; --accent: #7c5cff; --ok: #35c56f; --warn: #e8a13c;
    --line: #303542;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
         font: 15px/1.45 system-ui, -apple-system, "Segoe UI", sans-serif; }
  .wrap { max-width: 860px; margin: 0 auto; padding: 20px 16px 60px; }
  header { display: flex; align-items: center; gap: 12px; margin-bottom: 6px; }
  header h1 { font-size: 20px; margin: 0; flex: 1; }
  .sub { color: var(--dim); margin: 0 0 18px; font-size: 13.5px; }
  button { background: var(--card2); color: var(--text); border: 1px solid var(--line);
           border-radius: 8px; padding: 6px 12px; font: inherit; font-size: 13.5px;
           cursor: pointer; }
  button:hover { border-color: var(--accent); }
  button.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  button.small { padding: 2px 8px; font-size: 12.5px; border-radius: 6px; }
  .card { background: var(--card); border: 1px solid var(--line); border-radius: 12px;
          padding: 14px 16px; margin-bottom: 14px; }
  .card.disabled { opacity: .55; }
  .row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  .zname { font-size: 16.5px; font-weight: 600; flex: 1; min-width: 140px; }
  .badge { font-size: 11.5px; padding: 2px 8px; border-radius: 999px;
           border: 1px solid var(--line); color: var(--dim); }
  .badge.armed { background: var(--ok); border-color: var(--ok); color: #06240f; font-weight: 600; }
  .badge.manual { border-color: var(--warn); color: var(--warn); }
  .lights { margin: 12px 0 4px; border-top: 1px solid var(--line); padding-top: 10px; }
  .light { display: flex; align-items: center; gap: 8px; padding: 4px 0; }
  .light .idx { color: var(--dim); width: 20px; text-align: right; font-variant-numeric: tabular-nums; }
  .light .fn { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .light label { color: var(--dim); font-size: 12.5px; display: flex; align-items: center; gap: 4px; }
  .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
              gap: 10px 18px; margin-top: 12px; border-top: 1px solid var(--line); padding-top: 12px; }
  .ctl { font-size: 12.5px; color: var(--dim); }
  .ctl input[type=number], .ctl input[type=text] {
    width: 100%; background: var(--card2); border: 1px solid var(--line); color: var(--text);
    border-radius: 6px; padding: 5px 8px; font: inherit; margin-top: 3px; }
  .ctl input[type=range] { width: 100%; margin-top: 8px; accent-color: var(--accent); }
  .foot { display: flex; align-items: center; gap: 10px; margin-top: 14px; }
  .foot .spacer { flex: 1; }
  .hint { color: var(--dim); font-size: 12px; }
  .toggle { display: inline-flex; align-items: center; gap: 7px; font-size: 13px; cursor: pointer; }
  .toggle input { accent-color: var(--accent); width: 16px; height: 16px; }
  .skipped { color: var(--dim); font-size: 12px; margin-top: 8px; }
  #msg { position: fixed; bottom: 16px; left: 50%; transform: translateX(-50%);
         background: var(--card2); border: 1px solid var(--line); border-radius: 8px;
         padding: 8px 16px; font-size: 13.5px; display: none; }
  .empty { text-align: center; color: var(--dim); padding: 40px 0; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Hue Entertainment</h1>
    <button id="rescan">↻ Rescan rooms</button>
  </header>
  <p class="sub">Zones are auto-built from your Home Assistant rooms. Put the lights in
  <b>pixel order</b> (effects sweep 1&nbsp;→&nbsp;N across the room) — use <b>Blink</b> to
  identify a bulb — and pick a central, always-powered bulb as the <b>proxy</b>.
  Changes apply instantly and update the matching LedFX device.</p>
  <div id="zones"><div class="empty">Loading…</div></div>
</div>
<div id="msg"></div>
<script>
"use strict";
let STATE = null;
const $ = (sel, el) => (el || document).querySelector(sel);

function toast(text) {
  const el = $("#msg");
  el.textContent = text; el.style.display = "block";
  clearTimeout(el._t); el._t = setTimeout(() => el.style.display = "none", 2500);
}

async function api(path, body) {
  const opts = body ? {method: "POST", headers: {"Content-Type": "application/json"},
                       body: JSON.stringify(body)} : {};
  const resp = await fetch(path.replace(/^\//, ""), opts);
  const data = await resp.json().catch(() => ({}));
  if (!resp.ok) throw new Error(data.error || resp.statusText);
  return data;
}

function render() {
  const host = $("#zones");
  host.innerHTML = "";
  if (!STATE.rooms.length) {
    host.innerHTML = `<div class="empty">${STATE.devices_seen
      ? "No rooms with color-capable Philips Hue bulbs found.<br>Assign your Hue bulbs to areas in Home Assistant, then hit Rescan."
      : "Waiting for zigbee2mqtt…"}</div>`;
    return;
  }
  for (const room of STATE.rooms) host.appendChild(card(room));
}

function card(room) {
  const el = document.createElement("div");
  el.className = "card" + (room.enabled ? "" : " disabled");
  const edit = {lights: [...room.lights], proxy: room.proxy, fps: room.fps,
                brightness_scale: room.brightness_scale,
                pause_entities: [...room.pause_entities], enabled: room.enabled};
  const isAuto = room.source === "auto";

  el.innerHTML = `
    <div class="row">
      <span class="zname">${room.name}</span>
      ${room.armed ? '<span class="badge armed">STREAMING</span>' : ""}
      ${!isAuto ? '<span class="badge manual">manual (options)</span>' : ""}
      <span class="badge">DDP :${room.ddp_port ?? "—"}</span>
      <label class="toggle"><input type="checkbox" class="en" ${room.enabled ? "checked" : ""}
        ${isAuto ? "" : "disabled"}> enabled</label>
    </div>
    <div class="lights"></div>
    ${room.skipped.length ? `<div class="skipped">Not included: ${room.skipped.join(", ")}</div>` : ""}
    <div class="controls">
      <label class="ctl">Target fps (5–25)
        <input type="number" class="fps" min="5" max="25" value="${room.fps}"></label>
      <label class="ctl">Brightness <span class="bval">${Math.round(room.brightness_scale * 100)}%</span>
        <input type="range" class="bri" min="5" max="100" value="${Math.round(room.brightness_scale * 100)}"></label>
      <label class="ctl">Pause while streaming (entities, comma-separated)
        <input type="text" class="pause" value="${room.pause_entities.join(", ")}"></label>
    </div>
    <div class="foot">
      <button class="test">${room.armed ? "■ Stop test" : "▶ Test stream"}</button>
      <span class="spacer"></span>
      <span class="hint save-hint" style="display:none">unsaved changes</span>
      <button class="primary save" ${isAuto ? "" : "disabled"}>Save</button>
    </div>`;

  const lightsHost = $(".lights", el);
  const dirty = () => { $(".save-hint", el).style.display = "inline"; };

  function renderLights() {
    lightsHost.innerHTML = "";
    edit.lights.forEach((fn, i) => {
      const row = document.createElement("div");
      row.className = "light";
      row.innerHTML = `
        <span class="idx">${i + 1}</span>
        <span class="fn">${fn}</span>
        <label><input type="radio" name="proxy-${room.slug}" ${edit.proxy === fn ? "checked" : ""}> proxy</label>
        <button class="small up" ${i === 0 ? "disabled" : ""}>↑</button>
        <button class="small down" ${i === edit.lights.length - 1 ? "disabled" : ""}>↓</button>
        <button class="small blink">Blink</button>`;
      $(".up", row).onclick = () => { [edit.lights[i-1], edit.lights[i]] = [edit.lights[i], edit.lights[i-1]]; dirty(); renderLights(); };
      $(".down", row).onclick = () => { [edit.lights[i+1], edit.lights[i]] = [edit.lights[i], edit.lights[i+1]]; dirty(); renderLights(); };
      $("input[type=radio]", row).onchange = () => { edit.proxy = fn; dirty(); };
      $(".blink", row).onclick = () => api("/api/blink", {light: fn})
        .then(() => toast(`${fn} blinking`)).catch(e => toast(e.message));
      lightsHost.appendChild(row);
    });
  }
  renderLights();

  $(".en", el).onchange = (ev) => { edit.enabled = ev.target.checked; dirty(); };
  $(".fps", el).onchange = (ev) => { edit.fps = Math.min(25, Math.max(5, +ev.target.value || 20)); dirty(); };
  $(".bri", el).oninput = (ev) => {
    edit.brightness_scale = (+ev.target.value) / 100;
    $(".bval", el).textContent = ev.target.value + "%"; dirty();
  };
  $(".pause", el).onchange = (ev) => {
    edit.pause_entities = ev.target.value.split(",").map(s => s.trim()).filter(Boolean); dirty();
  };
  $(".save", el).onclick = async () => {
    try {
      STATE = await api(`/api/zone/${room.slug}`, edit);
      toast(`${room.name} saved`); render();
    } catch (e) { toast("Save failed: " + e.message); }
  };
  $(".test", el).onclick = async () => {
    try {
      STATE = await api(`/api/arm/${room.slug}`, {armed: !room.armed});
      toast(room.armed ? "Stopped" : "Streaming — play something in LedFX to see it move");
      render();
    } catch (e) { toast(e.message); }
  };
  return el;
}

$("#rescan").onclick = async () => {
  toast("Rescanning rooms…");
  try { STATE = await api("/api/rescan", {}); render(); toast("Rescan complete"); }
  catch (e) { toast("Rescan failed: " + e.message); }
};

async function refresh() {
  try { STATE = await api("/api/state"); render(); } catch (e) { /* retry next tick */ }
}
refresh();
setInterval(async () => {
  // light polling to keep the STREAMING badges honest without clobbering edits
  try {
    const fresh = await api("/api/state");
    const armedChanged = JSON.stringify(fresh.rooms.map(r => [r.slug, r.armed, r.enabled]))
      !== JSON.stringify(STATE.rooms.map(r => [r.slug, r.armed, r.enabled]));
    const roomsChanged = fresh.rooms.length !== STATE.rooms.length;
    if (armedChanged || roomsChanged) { STATE = fresh; render(); }
  } catch (e) {}
}, 5000);
</script>
</body>
</html>
