configuration:
  log_level:
    name: Log level
    description: >-
      App log verbosity. 'debug' logs every state transition - use it only when
      troubleshooting.
  ledfx_url:
    name: LedFX URL
    description: >-
      LedFX API base URL. On start the app auto-creates one matching DDP device
      per zone in LedFX (named "Hue <zone>") - no manual mirroring. Default
      reaches the LedFX app on this host. Set empty to disable.
  ledfx_ddp_target:
    name: LedFX DDP target
    description: >-
      The address LedFX sends pixel data to (where this app listens). Leave at
      127.0.0.1 unless LedFX runs on a different machine.
  zones:
    name: Zones
    description: >-
      Entertainment zones (max 10 lights each). Per zone: name; lights =
      zigbee2mqtt friendly names in pixel order; proxy = re-broadcasting bulb
      (defaults to the first light; must be in radio range of the others);
      fps (5-25, default 20); ddp_port = this zone's DDP UDP listen port
      (default 4048 + index); idle_timeout_s = auto-stop after this many
      seconds without DDP (default 30); auto_start = arm when DDP arrives
      (default true); brightness_scale = global output dimmer (0.05-1.0);
      pause_entities = entities switched off while streaming (e.g. your
      Adaptive Lighting switch) and restored afterwards.
